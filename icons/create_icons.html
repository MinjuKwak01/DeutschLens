<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>DeutschLens 아이콘 생성기</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f1f5f9; }
    h1 { font-size: 18px; margin-bottom: 16px; }
    .icons { display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 20px; }
    .icon-wrap { text-align: center; }
    .icon-wrap p { font-size: 12px; color: #64748b; margin-top: 4px; }
    canvas { display: block; border: 1px solid #e2e8f0; border-radius: 4px; }
    .instructions { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; max-width: 500px; }
    .instructions ol { margin-left: 20px; line-height: 1.8; font-size: 14px; }
    .btn { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; margin-top: 16px; }
    .btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <h1>🇩🇪 DeutschLens 아이콘 생성기</h1>

  <div class="icons" id="icons-container"></div>

  <div class="instructions">
    <p><strong>사용 방법:</strong></p>
    <ol>
      <li>아래 <strong>"아이콘 다운로드"</strong> 버튼을 클릭하세요.</li>
      <li>각 파일을 <code>icons/</code> 폴더에 저장하세요:
        <ul style="margin-top:4px; margin-left:16px; font-size:13px; color:#64748b;">
          <li><code>icon16.png</code></li>
          <li><code>icon48.png</code></li>
          <li><code>icon128.png</code></li>
        </ul>
      </li>
      <li>아이콘 파일을 저장한 후, <code>manifest.json</code>의 <code>action</code> 항목에 추가하세요 (선택 사항).</li>
    </ol>
    <button class="btn" id="download-all">아이콘 모두 다운로드</button>
  </div>

  <script>
    const SIZES = [16, 32, 48, 128];

    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const h = Math.floor(size / 3);
      const r = size * 0.12;

      // Rounded rect clip
      ctx.beginPath();
      ctx.moveTo(r, 0); ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.clip();

      // 독일 국기
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, size, h);
      ctx.fillStyle = '#DD0000';
      ctx.fillRect(0, h, size, h);
      ctx.fillStyle = '#FFCE00';
      ctx.fillRect(0, h * 2, size, size);

      // 글자 D
      ctx.fillStyle = 'white';
      ctx.font = `bold ${Math.floor(size * 0.62)}px Arial, Helvetica, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.4)';
      ctx.shadowBlur = size * 0.08;
      ctx.fillText('D', size / 2, size / 2 + size * 0.02);

      return canvas;
    }

    const container = document.getElementById('icons-container');

    SIZES.forEach(size => {
      const canvas = drawIcon(size);
      const wrap = document.createElement('div');
      wrap.className = 'icon-wrap';
      wrap.appendChild(canvas);
      wrap.appendChild(Object.assign(document.createElement('p'), { textContent: `${size}×${size}` }));
      container.appendChild(wrap);
    });

    document.getElementById('download-all').addEventListener('click', () => {
      const downloadSizes = [16, 48, 128];
      downloadSizes.forEach(size => {
        const canvas = drawIcon(size);
        const link = document.createElement('a');
        link.download = `icon${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    });
  </script>
</body>
</html>
